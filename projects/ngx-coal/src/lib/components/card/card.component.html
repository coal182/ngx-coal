<mat-card>
    <mat-card-header>
        <mat-card-title>
            <ng-content select="[coal-card-title]"></ng-content>
        </mat-card-title>
        <mat-card-subtitle>
            <ng-content select="[coal-card-subtitle]"></ng-content>
        </mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
        <ng-content></ng-content>
    </mat-card-content>
    @if (showButtons) {
        <br />
        <mat-divider></mat-divider>
        <mat-card-actions>
            <button
                mat-button
                (click)="reset()"
                [disabled]="status === 'invalid'"
            >
                Reset
            </button>
            <button
                mat-button
                (click)="save()"
                [disabled]="status === 'invalid'"
            >
                Save
            </button>
            @if (status === "succeeded") {
                <mat-icon fontIcon="check"></mat-icon>
            }
            @if (status === "failed") {
                <mat-icon fontIcon="error"></mat-icon>
            }
        </mat-card-actions>
        @if (status === "saving") {
            <mat-card-footer>
                <mat-progress-bar mode="indeterminate"></mat-progress-bar>
            </mat-card-footer>
        }
    }
</mat-card>
